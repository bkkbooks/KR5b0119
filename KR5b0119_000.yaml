front:
  text: 太上玉晨鬱儀結璘奔日月圖國六太上隱書中篇曰子欲為真當存日君駕龍驂鳳乘天景雲東遊希林遂入帝門精思乃得要道不煩名上清靈列位真官乃執鬱儀文太上隱書中篇曰子欲升天當存月夫人駕十天龍乘我流鈴西到六嶺遂入帝堂精思乃見上朝天皇乃執結璘章
  hash: sha256:d62a4d0dddaab773af03c5de524c553929b5ef6eb15cfa776be58b31b91111ab
