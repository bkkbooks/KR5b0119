body:
  text: 右奔日月隱道太上上清太極九皇四真人之所寶祕玄虛元君之玉章也自非有金閣玉名及録字東華皆不聞見二篇目矣行之者先清齊百日絶交人事乃可為之也久久行之上奔日月得給玉童玉女各五十人太上鬱儀赤文結璘黃章乃太上玉帝君之靈祕篇也藏之於九天之房丹瑶之臺非勤心好真宿有飛玄天仙之骨録者莫得而見聞也聞其篇目皆不可妄言稱及妄言稱及犯者受考三官天地不赦初令三百年得宣傳一人却後七百年復得傳一人若神真冥告有冝授者傳之也傳受之法皆師友相授以崇玄科也非其人不遵法度為泄宣天文也漏慢違誓死為下鬼乃七祖受考風刀之罪自非同氣寧當閉口西玄山洞臺中有此二經刻以玉簡書以金字及王屋清虛天皆有而不備具也中宫仙人泰清諸官並不知此書是何事也峨嵋山北洞中石室户樞刻石書字曰鬱儀引日精結璘𦤺月神得道處上宫位稱大夫真凡二十字下仙見之甚自不解其意義是何等事也如此仙人自有不見其篇目録者多矣其金液九丹蓋小術也皆不得飛行上清欲行此道不必賢愚但地上無此文耳真官玄法啓誓乃傳有得而行位為上真乃乘八景瓊輪遊行九晨故祕言曰子得鬱儀結璘乃成上清之真不修此道不得見三元君太素真人曰子存日精五帝君口含太上鬱儀文須此道成乃見日中君無此徒勞自煩𡨚又曰子存月精五帝夫人口含太上結璘章須此道成乃見月夫人無此徒勞自悼傷右二條太素真人受太帝君訣言太上隱書云存時執之帝君云含之太素真人教裴君存時含一文執一文並行之也太素真人傳清靈真人裴君二事太上鬱儀結璘文章以𦤺於日月之精神上奔日月通天光飛太空之道也皆乘雲車羽蓋駕命羣龍而上升皇天紫庭也內視中方曰子欲步空當存日月子欲登清靈當存五星密室密行不出户庭此之謂也素奏丹符曰大哉鬱儀妙乎結璘非上真不見非上仙不聞以𦤺日月五精之神乘龍步空足躡景雲遂與五帝上入天門有人聞之愼勿妄言去世可出誓金乃傳要付弟子有心之人妄道篇目玉童上言泄則被考身終不仙玉童玉女去而不還書文必失獲刑三官子其愼言言為罪源日宫玉堂宗旨云當於朔旦平坐清齊靜定叩齒三十六通先存自己丹田為大海日從海出本身坐頂門身如山石呪曰陽生元海自下而升混混陽精逐散羣隂中有大神鬱儀之君降此真氣濯我身形玉堂宗旨云誦呪畢咽津九過次存日升金光照映我真形我朝日宫呪曰金輪呈瑞洞煥陽明炎光奔飛萬里流精魔爽滅焰塵垢蕩清冲虛飛步馭氣髙升玉堂宗旨云誦呪畢咽液九過次乘火龍奔日宫呪曰火龍前驅透頂光飛神入無何朝拜鬱儀𣊬目上御混合靈輝一真逐本燒滅彭尸玉堂宗旨云誦呪畢咽津九過思入日宫與身為一良久忘形融融如春行之一年辟病役使鬼神去來自然二年通仙三界侍衛三年魔王保舉九年功成五帝下友詔子為真人得長生矣大上王晨鬱儀奔日赤景玉文靈書紫文曰採服飛根吞日氣之法昔授之於太微天帝君一名赤丹金精石景水母玉胞經其法常以日初出之時東向叩齒九通畢微祝曰日魂名日中五帝字曰日魂朱景照韜緑映回霞赤童玄炎飊象右呼此十六字握固存日中五色流霞來接一身日光流霞俱入口中上清紫書曰吞月精法月初出時西向叩齒十通微祝月魄名月中夫人字曰月魄曖蕭芳艷翳寥婉虛靈蘭鬱華結翹淳金清瑩炅容臺標右呪此二十四字畢暝目握固存月中五色精光俱入口中又月中有黃氣大如目瞳名曰飛華玉胞之精能修此道則奔日月之仙也凡行鬱儀奔日之道旦旦常當伺視日初出之時無日當靜室中對日東向叩齒九通臨目閉氣九息又咽日光暉九遍存光霞使入口中即而吞之畢微呼曰日中青帝諱圓常元字照龍韜衣青玉錦帔蒼華飛羽裙建翠芙蓉晨冠日中赤帝諱丹靈峙字緑虹映衣絳玉錦帔丹華飛羽裙建丹芙蓉靈明冠日中白帝諱浩鬱將字回金霞衣素玉錦帔白羽飛華裙建皓靈芙華冠日中黑帝諱澄潧渟字玄緑炎衣玄玉錦帔黑羽飛華裙建玄山芙蓉冠日中黃帝諱壽逸阜字飊暉象衣黃玉錦帔黃羽飛華裙建黃芙靈紫冠月中夫人魂精內神名曖蕭臺標凡三過仍閉目握固存見日中五色流霞皆來接一身下至兩足又存令五色氣上至頭頂於是日光流霞五色俱來口中又日光流霞之中自復有紫氣大如目瞳者纍重數十焆煥在五色光中名之曰飛根水母也並俱與五氣來入口中向日吞霞作四十五咽氣畢又叩齒九過微祝曰赤爐丹氣圓天飛精剛以受柔炎水隂英日辰元景號曰大明九陽齊化二烟俱生凝魂和魄五氣之精中生五帝乘光御形採飛以虛啜根以盈首巾龍華帔朱帶青轡烏流玄霞映上清賜書玉簡金閣刻名服食朝霞與道合靈飛仙太微上升紫庭祝畢存青帝君從日光中來下在我之左存赤帝君從日光中來下在我之右存白帝君從日光中來下在我之背存黑帝君從日光中來下在我之左手上存黃帝君從日光中來下在我之右手上五帝都來存服色極令髣佛於是叩齒五通咽液九過微祝曰赤爐丹景圓華九明大暉啓晨煥曜朱精五帝肇霞映洞萬生觀落上真空無條平運氣練采流蕩五形使我神化六腑敷靈同與帝君太乙無英驂乘絳雲陽燧九軿上奔日中與帝合靈壽均天地二晨相傾畢又叩齒三通咽液三過又微祝曰月魄精神曖蕭臺標使我得到日窟之天東蒙長丘得授揮神之章帶九有之符食青精之飴飲雲碧之腴宴八極之域登明真之臺坐希林之殿詠玉晨之辭祝畢右存陽燧絳雲之車駕九赤龍來從日光中到我之前仍存五帝共乘而奔日也自忘形良久咽液十四過訖乃閉目極念存思自有髣佛便向日再拜能久行此道者必得乘景奔日此鬱儀之道畢矣若道士休糧山中長齊五嶽絶塵人間逺思清真可每日服日根之霞吞太陽之精則立覺體生玉澤面有流光也如其外纍人事未獲靜形浮游世路心拘縈網者要以月朔三日五日七日九日十三十五十七十九二十五日按而為之如上法一月之中十過也其日是日魂下接飛根盈滿水母羣夢之時也右凡行之十八年上清當練之以金真瑩以玉光位為真皇飛行太空乘華三素以映天下太上服日氣開明靈符右月晦夜半朱書青𥿄上東向服之以先告日魂也臨服符時閉氣左手執符心呪曰太微丹書名曰開明𦤺日上魂來化某形平且嚴裝發自圓庭飛華水母日根金精紫映流光號為五靈呪畢乃服符月官復於望日存自已如昆崘山身坐山頂山下大海月輪初生咽津三過叩齒三通呪真景初生隂中至陽水泛玄輪金露微芒津源暢通輝映瓊房氣增光盛服御飛翔誦畢咽津九過次存月光如半規金光照映我身呪曰景散天池金水半規光明幽夜照我玄珠飲泛晶漿香透靈軀數周真㑹乘景冲飛誦呪畢咽津九過叩齒存月圓真水成橋下接山石我身乘彩鳳入月中呪曰天源周流光透重樓霄映十方五液蕩幽冲虛攝景真身飛浮一真上朝陽九無憂誦畢咽津九過思入月宫與身為一良久忘形覺金光四散普天光明行之一年無病役鬼神去來自然二年通真三界侍衛三年魔王保舉九年功成五夫人下詔子形而得飛仙矣太上玉晨結璘奔月黃景玉章靈書紫文曰採服隂華吞月精之法昔授之於太微天帝君一名黃氣陽精藏天隱月經行結璘奔月之道當伺視月初出之時無月當於靜室中乃對月西向叩齒十通臨目閉氣九息又咽月光九過當存月光使入口中即而吞之畢微呼曰月中青帝夫人諱朱隱娥字芬艷嬰衣青華瓊錦帔翠龍鳳文飛羽裙月中赤帝夫人諱翳逸寥字婉筵虛衣丹蘂玉錦帔朱華鳳落飛羽裙月中白帝夫人諱靈素蘭字鬱連華衣白琳四出龍錦帔素羽鸞章飛華裙月中黑帝夫人諱結連翹字淳屬金衣玄琅九道雲錦帔黑羽龍文飛華裙月中黃帝夫人諱青營襟字炅定容衣黃雲山雲錦帔緑羽鳳華繡裙右夫人頭上並頽雲三角髻餘髮垂之至腰日中五色魂精內神名珠景赤童凡祝三過仍暝目握固存見月中五色流精皆來接一身下至兩足存令五氣上至頭頂於是月光五色流精俱來入口中又月光流精之中自復有黃氣大如目瞳者纍重數十相隨在月精光五色之中名曰飛黃月華之精也並俱與五氣來入口中向月吞精作五十咽畢咽液十過畢又叩齒十通微祝曰黃精玄暉元隂上氣散鬱寒飇條靈斂胃虛波瀾頴遊曜淳器月精夜景玄宫上貴五君夫人各保母位赤子飛入嬰兒續至回隂三合光玄萬方和魂制魄五胎流通乘霞飛精逸虛於東首結靈雲景華招風左帶龍符右腰虎章鳳羽朱帔玉珮金璫騫樹結阿號曰木王神蟇控根有虧有光明精內映玄水吐梁賜書玉扎刻名雲房服食月華與真合同飛仙紫微上朝太皇存青帝夫人從月光中來下在我之左存赤帝夫人從月光中來下在我之右存白帝夫人從月光中來下在我之背存黑帝夫人從月光中來下在我之左手上存黃帝夫人從月光中來下在我之右手上五帝夫人都來存服色極令髣佛於是叩齒九通咽液九過微祝曰黃精啓暉元隂內章映觀太玄開洞萬方散蔚寒飇七晨懸琅回隂三合天地吐光紫曜遊落浮華九空圓明賦采六氣化通五帝夫人攝雲把風靈帔鬱羅佩瓊帶璫羽裙拂霄逸雲扇東騫樹敷晨蓋條秀蓬雲蟇練摩扶養木王洞根萬里廕遏五躬魂和神化六玄靈充還老歸嬰玉映反童帝君合化併景桃康時乘流鈴飛雲十龍上奔明月位為保皇夀合二象天地無窮祝畢又叩齒七通咽液七過微祝曰日魂精神名珠景赤童使我西到六嶺之門入協晨玉宫八紘素丘八景上房得帶十明之符佩流星夜光之章坐太和之殿登七靈之臺飲月華雲腴食黃琬紫津之飴詠髙上靈篇吟玉晨真詞祝畢右存流鈴飛雲之車駕十黃龍來從月光中到我之前仍存與五夫人同乘而奔月也自入已形良久咽液三十過訖乃開目極念存思自有倣佛便向月再拜能久行此道者必得乘景奔月此結璘之道畢矣施行要訣如服月光能夕夕服之則立覺體生光照目有飛精也要法月二日四日六日八日十日十四十六十八二十二二十四二十六日一月之中凡十一過亦足成仙也此日之夕是隂精飛合三氣盈溢月水結華黃神下接之時也行之十八年上清當錬魂易質映以玉光乘玄轡景飛行太空紫微服月精太玄隂生符右月晦夜半黃書青𥿄上東向服之以先告月魂也是時當先服開明靈符也臨服月符閉氣右手執符心呪曰紫微黃書名曰太玄𦤺月華水養魄和魂方中嚴事發自玄關藏天隱月五靈夫人飛光九道映朗泥丸呪畢乃服符又曰能知月魄名終身無灾萬害不傷太上藏日月帝夫人諱字於太素宫有知之者神仙又曰能知日魂名終身無疾萬禍不犯太上藏日月魂名於紫虛玉宫有知之者通神使靈存奔日月道者任所便耳不必盡為之也欲得靜室隱止唯令見日月之始暉處也若不絶人事與外物相干者不得行此道也夜常燒香存五帝五夫人名字心呪曰願與帝君太一五神合景如一於是二十四年行之亦白日升天亦不必行奔存之道恆存在我之左右并心呪舊說勿令耳聞若已得仙道備練精思者二年存之便有倣佛三年形見五年得奔日月也自非已成仙人始欲精思者故為不速能久修之上屬二景為上清真人七百年付一人焉太上玉晨鬱儀結璘奔日月圖
